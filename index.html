<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Link de Acesso</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#0a0e18;color:#e8edf5;padding:24px}
.wrap{max-width:900px;margin:0 auto}
.card{background:#111827;border:1px solid #1c3355;border-radius:16px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
h1{margin:0 0 6px;font-size:28px}
.sub{color:#8a9bb5;margin:0 0 20px}
label{display:block;font-weight:700;margin-bottom:8px}
input,textarea{width:100%;border:1px solid #22304a;background:#0b1220;color:#fff;border-radius:10px;padding:14px;font-size:15px;outline:none}
textarea{min-height:330px;resize:vertical;line-height:1.5}
.row{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
button{border:none;border-radius:10px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;color:#fff}
.b1{background:linear-gradient(135deg,#0a6fde,#0858b0)}
.b2{background:linear-gradient(135deg,#10b981,#059669)}
.b3{background:#1a2332;border:1px solid #30415f}
.linkbox{margin-top:16px;background:#0b1220;border:1px solid #22304a;padding:14px;border-radius:10px;word-break:break-all;min-height:54px}
.note{color:#8a9bb5;font-size:13px;margin-top:8px}
.ok{color:#10b981}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>🔐 Gerador de Link de Acesso</h1>
      <p class="sub">Cole o link do app, gere o acesso e copie a mensagem pronta para enviar.</p>

      <label for="appLink">Link do app</label>
      <input id="appLink" type="text" placeholder="Ex.: https://seusite.github.io/app" />
      <div class="note">Cole aqui qualquer link do seu app.</div>

      <div class="row">
        <button class="b1" onclick="gerar()">⚡ Gerar link</button>
        <button class="b2" onclick="enviarWhats()">📱 Enviar no WhatsApp</button>
        <button class="b3" onclick="copiarMensagem()">📋 Copiar mensagem</button>
      </div>

      <label>Link gerado</label>
      <div id="linkGerado" class="linkbox">Nenhum link gerado ainda.</div>
      <div id="status" class="note"></div>

      <div style="height:18px"></div>
      <label for="mensagem">Mensagem pronta</label>
      <textarea id="mensagem" placeholder="A mensagem aparecerá aqui..."></textarea>
    </div>
  </div>

<script>
let linkFinal = "";
let tokenAtual = "";

function gerarToken() {
  const parte1 = Math.random().toString(36).substring(2, 6).toUpperCase();
  const parte2 = Math.random().toString(36).substring(2, 6).toUpperCase();
  return parte1 + "-" + parte2;
}

function montarLink(base, token) {
  try {
    const url = new URL(base);
    url.searchParams.set("t", token);
    return url.toString();
  } catch (e) {
    return "";
  }
}

function gerarMensagem(link) {
  return (
`📱 *App Técnico*\n\nAcesse o app pelo link abaixo:\n\n🔗 ${link}\n\n━━━━━━━━━━━━━━━\n📲 ANDROID (Chrome)\n\n1️⃣ Abra o link acima no celular\n2️⃣ Toque nos 3 pontinhos (⋮) no canto superior direito\n3️⃣ Procure a opção Adicionar à tela inicial\n4️⃣ Toque em Adicionar\n5️⃣ Depois toque em Confirmar\n\n✅ Pronto!\nO ícone do app aparecerá na tela principal do celular.\n\n━━━━━━━━━━━━━━━\n🍎 IPHONE (Safari)\n\n1️⃣ Abra o link no Safari\n2️⃣ Toque no botão Compartilhar\n3️⃣ Role a tela até encontrar Adicionar à Tela de Início\n4️⃣ Toque em Adicionar\n5️⃣ Confirme tocando em Adicionar novamente\n\n✅ Pronto!\nO ícone do app aparecerá na tela principal do iPhone.\n\n━━━━━━━━━━━━━━━\n⚠️ IMPORTANTE\n\n• Este link funciona apenas uma vez\n• Depois de instalado, abra sempre pelo ícone da tela principal`
  );
}

function gerar() {
  const base = document.getElementById("appLink").value.trim();

  if (!base) {
    alert("Cole o link do app primeiro.");
    return;
  }

  tokenAtual = gerarToken();
  linkFinal = montarLink(base, tokenAtual);

  if (!linkFinal) {
    alert("O link informado não é válido.");
    return;
  }

  document.getElementById("linkGerado").textContent = linkFinal;
  document.getElementById("mensagem").value = gerarMensagem(linkFinal);
  document.getElementById("status").innerHTML = '<span class="ok">✅ Link gerado com sucesso.</span>';
}

async function copiarMensagem() {
  const texto = document.getElementById("mensagem").value.trim();
  if (!texto) {
    alert("Gere o link primeiro.");
    return;
  }
  try {
    await navigator.clipboard.writeText(texto);
    alert("Mensagem copiada.");
  } catch (e) {
    alert("Não consegui copiar automaticamente. Tente copiar manualmente.");
  }
}

function enviarWhats() {
  const texto = document.getElementById("mensagem").value.trim();
  if (!texto) {
    alert("Gere o link primeiro.");
    return;
  }
  const url = "https://wa.me/?text=" + encodeURIComponent(texto);
  window.open(url, "_blank");
}
</script>
</body>
</html>
