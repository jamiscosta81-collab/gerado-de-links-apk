<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>App Acesso (expira no abrir)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
font-family:Arial;
background:#0a0e18;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
text-align:center;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.ativar{background:#2563eb;color:white}
.download{background:#10b981;color:white}
</style>

</head>

<body>

<div class="card">

<h2>🔐 Acesso</h2>

<p id="status">Verificando...</p>

<button id="btn" class="ativar" onclick="ativar()" style="display:none">
Ativar App
</button>

<button class="download" onclick="baixarZIP()">
⬇️ Baixar Código
</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const token = params.get("t");

const status = document.getElementById("status");
const btn = document.getElementById("btn");

const chave = "token_" + token;

if(!token){
status.innerText = "Link inválido";
}

else if(localStorage.getItem(chave)){
status.innerText = "Link já usado";
}

else{

// marca no primeiro acesso
localStorage.setItem(chave, "usado");

status.innerText = "Link válido";
btn.style.display = "block";
}

function ativar(){
window.location.href="app.html";
}

async function baixarZIP(){

let zip = new JSZip()

let conteudo = document.documentElement.outerHTML

zip.file("app_acesso.html", conteudo)

let blob = await zip.generateAsync({type:"blob"})

let a = document.createElement("a")
a.href = URL.createObjectURL(blob)
a.download = "app_acesso.zip"
a.click()

}

</script>

</body>
</html>
